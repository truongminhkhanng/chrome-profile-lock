<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Lock Lite</title>
  <link rel="icon" type="image/png" href="assets/icon32.png" />
  <link rel="stylesheet" href="lock.css" />
  <link rel="stylesheet" href="pin-input.css" />
</head>
<body>
  <main class="lock-page">
    <section class="visual-panel" aria-hidden="true">
      <div class="visual-content">
        <div class="shield"><span class="shield-lock"></span></div>
        <p class="visual-kicker">Profile Lock Lite</p>
        <h2>Kh&#244;ng gian duy&#7879;t web c&#7911;a b&#7841;n &#273;ang &#273;&#432;&#7907;c b&#7843;o v&#7879;.</h2>
        <p>M&#7903; kh&#243;a &#273;&#7875; ti&#7871;p t&#7909;c phi&#234;n l&#224;m vi&#7879;c hi&#7879;n t&#7841;i.</p>
      </div>
      <div class="orb orb-one"></div><div class="orb orb-two"></div>
    </section>

    <section class="form-panel">
      <div class="unlock-card">
        <header class="mobile-brand"><span class="brand-mark"><span class="mini-lock"></span></span><strong>Profile Lock</strong></header>
        <span class="eyebrow" id="greeting">Ch&#224;o m&#7915;ng tr&#7903; l&#7841;i</span>
        <h1>M&#7903; kh&#243;a Chrome</h1>
        <p id="subtitle" class="subtitle">Nh&#7853;p m&#7853;t kh&#7849;u &#273;&#7875; ti&#7871;p t&#7909;c phi&#234;n l&#224;m vi&#7879;c.</p>
        <div id="unlockTabs" class="unlock-tabs">
          <button type="button" class="tab active" data-mode="password">Mã PIN</button>
          <button type="button" class="tab" data-mode="recovery">Recovery</button>
        </div>
        <form id="unlockForm">
          <label for="password" id="inputLabel">Mã PIN</label>
          <pin-input id="password" length="4" aria-label="Mã PIN mở khóa"></pin-input>
          <input id="recoveryInput" type="text" placeholder="PL-XXXX-XXXX-XXXX-XXXX-XXXX" autocomplete="off" hidden />
          <p id="capsWarning" class="caps-warning" hidden>Caps Lock đang bật.</p>
          <button type="submit" id="submitBtn">Mở khóa</button>
        </form>
        <p id="message" class="message" role="status" aria-live="polite"></p>
        <p id="attemptsInfo" class="attempts-info"></p>
        <div class="hint"><span class="hint-dot"></span><p>M&#7853;t kh&#7849;u ch&#7881; &#273;&#432;&#7907;c x&#7917; l&#253; c&#7909;c b&#7897; tr&#234;n thi&#7871;t b&#7883; n&#224;y.</p></div>
      </div>
    </section>
  </main>
  <script src="pin-input.js"></script>
  <script src="lock.js"></script>
</body>
</html>
