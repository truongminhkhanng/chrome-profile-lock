<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Lock</title>
  <link rel="icon" type="image/png" href="assets/icon32.png" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="popup-shell">
    <header class="brand">
      <div class="brand-icon" aria-hidden="true"><span class="lock-mark"></span></div>
      <div><h1>Chrome Profile Lock</h1><p>Kiểm soát quyền truy cập nhanh</p></div>
    </header>
    <section class="status-card" id="statusCard" aria-label="Trạng thái bảo vệ">
      <span class="status-dot" aria-hidden="true"></span>
      <div><strong id="statusTitle">Đang tải trạng thái</strong><span id="statusText">Vui lòng chờ…</span></div>
    </section>
    <section id="siteCard" class="site-card" hidden><strong id="siteHost"></strong><span id="siteStatus"></span><button id="toggleSiteProtection" class="button button-secondary" type="button"></button></section>
    <div class="actions">
      <button id="lockNow" class="button button-primary" type="button"><span class="mini-lock" aria-hidden="true"></span>Khóa Chrome ngay</button>
      <button id="openSettings" class="button button-secondary" type="button">Mở cài đặt</button>
    </div>
    <p id="message" class="message" role="status" aria-live="polite"></p>
  </main>
  <script src="theme-utils.js"></script><script src="popup.js"></script>
</body>
</html>
